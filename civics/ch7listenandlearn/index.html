<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civics Ch 7 Listen and Learn</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
    width: 380px;
  }
  h1 { font-size: 20px; margin-bottom: 12px; color: #333; }
  #gameTitle { font-size: 20px; color: #333; margin-bottom: 12px; }
  input[type="text"] {
    padding: 10px; width: 80%;
    border: 1px solid #ccc; border-radius: 8px;
    margin-bottom: 20px;
  }
  button {
    padding: 12px; margin: 8px 0; width: 100%;
    border: none; border-radius: 8px;
    font-size: 16px; cursor: pointer;
  }
  .primary { background-color: #4CAF50; color: white; }
  .play-btn { background-color: #1E90FF; color: white; }
  .choice-btn {
    margin: 5px 0;
    border-radius: 8px;
    cursor: pointer;
    color: #fff;
    font-size: 18px;
    padding: 14px;
  }
  .feedback { margin-top: 15px; font-weight: bold; font-size: 18px; }
  .hidden { display: none; }
  .progress-bar {
    width: 100%; height: 8px;
    background-color: #e0e0e0;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  #progressFill {
    height: 100%; width: 0%;
    background-color: #FFA500;
    border-radius: 4px;
  }
  #endQuizTitle {
    font-size: 18px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div class="container" id="startScreen">
  <h1>Enter nickname</h1>
  <input type="text" id="nickname" placeholder="Your name">
  <button class="primary" onclick="startQuiz()">Start</button>
</div>

<div class="container hidden" id="quizScreen">
  <h1 id="gameTitle"></h1>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div id="questionCounter"></div>
  <h1>Listen and choose:</h1>
  <button class="play-btn" onclick="playSentence()">🔊 Play Sentence</button>
  <div id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="container hidden" id="endScreen">
  <h1>Quiz Finished!</h1>
  <h2 id="endQuizTitle"></h2>
  <p id="finalResult"></p>
  <button class="primary" onclick="location.reload()">Play Again</button>
</div>

<script>
const quizTitle = "Civics Ch 7 Listen and Learn";

const sentences = [
           { en: "Many companies such as farms and shops have one owner.", jp: "多くの会社は農場や店などのように、所有者が一人です。", enAudio: "audio/01_many_companies_such_as_farms_a_en.mp3", jpAudio: "audio/01_many_companies_such_as_farms_a_jp.mp3" },
  { en: "But people often sell shares and use the money to start companies.", jp: "しかし、人々はしばしば株を売って、そのお金で会社を始めます。", enAudio: "audio/02_but_people_often_sell_shares_a_en.mp3", jpAudio: "audio/02_but_people_often_sell_shares_a_jp.mp3" },
  { en: "People with shares are called shareholders.", jp: "株を持っている人たちは株主と呼ばれます。", enAudio: "audio/03_people_with_shares_are_called__en.mp3", jpAudio: "audio/03_people_with_shares_are_called__jp.mp3" },
  { en: "These companies are called corporations.", jp: "これらの会社は株式会社と呼ばれます。", enAudio: "audio/04_these_companies_are_called_cor_en.mp3", jpAudio: "audio/04_these_companies_are_called_cor_jp.mp3" },
  { en: "Corporations can borrow money and own things like people.", jp: "株式会社はお金を借りたり、物を所有したりすることができます。", enAudio: "audio/05_corporations_can_borrow_money__en.mp3", jpAudio: "audio/05_corporations_can_borrow_money__jp.mp3" },
  { en: "Corporations began because people needed large amounts of money to build things such as ships and factories.", jp: "株式会社は、船や工場のようなものを建てるために多額のお金が必要だったので始まりました。", enAudio: "audio/06_corporations_began_because_peo_en.mp3", jpAudio: "audio/06_corporations_began_because_peo_jp.mp3" },
  { en: "Sometimes the manager is the main shareholder and owns most of the shares.", jp: "時々、経営者は主な株主であり、株のほとんどを所有しています。", enAudio: "audio/07_sometimes_the_manager_is_the_m_en.mp3", jpAudio: "audio/07_sometimes_the_manager_is_the_m_jp.mp3" },
  { en: "In large corporations, the shareholders don’t usually run the business.", jp: "大きな株式会社では、株主は普通、事業を経営しません。", enAudio: "audio/08_in_large_corporations_the_shar_en.mp3", jpAudio: "audio/08_in_large_corporations_the_shar_jp.mp3" },
  { en: "They hire a manager.", jp: "彼らは経営者を雇います。", enAudio: "audio/09_they_hire_a_manager_en.mp3", jpAudio: "audio/09_they_hire_a_manager_jp.mp3" },
  { en: "If the manager doesn’t run the business well, the shareholders can choose a different manager.", jp: "もし経営者がうまく事業を経営しなければ、株主は違う経営者を選ぶことができます。", enAudio: "audio/10_if_the_manager_doesnt_run_the__en.mp3", jpAudio: "audio/10_if_the_manager_doesnt_run_the__jp.mp3" },
  { en: "They talk about it at shareholders’ meetings and vote to make decisions.", jp: "彼らは株主総会で話し合い、投票して決定します。", enAudio: "audio/11_they_talk_about_it_at_sharehol_en.mp3", jpAudio: "audio/11_they_talk_about_it_at_sharehol_jp.mp3" },
  { en: "When corporations make profits, the shareholders get part of the money.", jp: "株式会社が利益をあげると、株主はそのお金の一部を受け取ります。", enAudio: "audio/12_when_corporations_make_profits_en.mp3", jpAudio: "audio/12_when_corporations_make_profits_jp.mp3" },
  { en: "This money is called a dividend.", jp: "このお金は配当金と呼ばれます。", enAudio: "audio/13_this_money_is_called_a_dividen_en.mp3", jpAudio: "audio/13_this_money_is_called_a_dividen_jp.mp3" },
  { en: "If a corporation goes bankrupt and dies, the shareholders lose their shares.", jp: "もし株式会社が倒産すると、株主は株を失います。", enAudio: "audio/14_if_a_corporation_goes_bankrupt_en.mp3", jpAudio: "audio/14_if_a_corporation_goes_bankrupt_jp.mp3" },
  { en: "But they don’t have to pay any money.", jp: "しかし、彼らはお金を払う必要はありません。", enAudio: "audio/15_but_they_dont_have_to_pay_any__en.mp3", jpAudio: "audio/15_but_they_dont_have_to_pay_any__jp.mp3" },
  { en: "This is called limited liability.", jp: "これを有限責任といいます。", enAudio: "audio/16_this_is_called_limited_liabili_en.mp3", jpAudio: "audio/16_this_is_called_limited_liabili_jp.mp3" },
  { en: "People can buy and sell shares at a stock exchange.", jp: "人々は証券取引所で株を売り買いすることができます。", enAudio: "audio/17_people_can_buy_and_sell_shares_en.mp3", jpAudio: "audio/17_people_can_buy_and_sell_shares_jp.mp3" },
  { en: "If good things happen to a company, many people want to buy its shares and the price goes up.", jp: "会社に良いことが起こると、多くの人はその株を買いたいと思い、値段が上がります。", enAudio: "audio/18_if_good_things_happen_to_a_com_en.mp3", jpAudio: "audio/18_if_good_things_happen_to_a_com_jp.mp3" },
  { en: "If bad things happen to a company, many people want to sell its shares and the price goes down.", jp: "会社に悪いことが起こると、多くの人はその株を売りたくなり、値段が下がります。", enAudio: "audio/19_if_bad_things_happen_to_a_comp_en.mp3", jpAudio: "audio/19_if_bad_things_happen_to_a_comp_jp.mp3" },
  { en: "Share prices also go up and down because of people’s feelings.", jp: "株価は人々の気持ちによっても上下します。", enAudio: "audio/20_share_prices_also_go_up_and_do_en.mp3", jpAudio: "audio/20_share_prices_also_go_up_and_do_jp.mp3" },
];

let questions = [];
let nickname = "";
let currentQuestion = 0;
let score = 0;
let firstTry = true;
let startTime;

const startScreen = document.getElementById("startScreen");
const quizScreen = document.getElementById("quizScreen");
const endScreen = document.getElementById("endScreen");
const gameTitleEl = document.getElementById("gameTitle");
const choicesDiv = document.getElementById("choices");
const feedbackDiv = document.getElementById("feedback");
const finalResult = document.getElementById("finalResult");
const questionCounterDiv = document.getElementById("questionCounter");
const progressFill = document.getElementById("progressFill");
const endQuizTitle = document.getElementById("endQuizTitle");

/* ---- logic unchanged below ---- */

function startQuiz() {
  nickname = document.getElementById("nickname").value.trim() || "Player";
  startTime = new Date();
  gameTitleEl.textContent = quizTitle;

  questions = [...sentences];
  shuffle(questions);
  questions = questions.slice(0, 10);

  const startEn = Math.random() < 0.5;
  questions = questions.map((q, i) => ({
    ...q,
    direction: (i % 2 === 0) ? (startEn ? "en" : "jp") : (startEn ? "jp" : "en")
  }));

  startScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  currentQuestion = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  feedbackDiv.textContent = "";
  feedbackDiv.style.color = "#333";
  firstTry = true;
  choicesDiv.innerHTML = "";

  const q = questions[currentQuestion];
  const isEnToJp = q.direction === "en";

  quizScreen.dataset.answer = isEnToJp ? q.jp : q.en;
  quizScreen.dataset.audio = isEnToJp ? q.enAudio : q.jpAudio;

  questionCounterDiv.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
  progressFill.style.width = ((currentQuestion + 1) / questions.length * 100) + "%";

  let pool = sentences.map(s => isEnToJp ? s.jp : s.en);
  shuffle(pool);

  let options = pool.slice(0, 3);
  if (!options.includes(quizScreen.dataset.answer)) {
    options[Math.floor(Math.random() * 3)] = quizScreen.dataset.answer;
  }

  const colors = ["#FFA500", "#FF4C4C", "#4CAF50"];
  options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "choice-btn";
    btn.style.backgroundColor = colors[i % colors.length];
    btn.onclick = () => checkAnswer(opt, btn);
    choicesDiv.appendChild(btn);
  });
}

function playSentence() {
  new Audio(quizScreen.dataset.audio).play();
}

function checkAnswer(choice, btn) {
  const correct = quizScreen.dataset.answer;
  disableChoices();

  if (choice === correct) {
    feedbackDiv.textContent = "Correct!";
    score += firstTry ? 2 : 1;
  } else if (firstTry) {
    feedbackDiv.style.color = "orange";
    feedbackDiv.textContent = "Try again!";
    firstTry = false;
    enableChoices();
    return;
  } else {
    feedbackDiv.style.color = "red";
    feedbackDiv.textContent = `Wrong! Correct answer: ${correct}`;
  }

  if (currentQuestion === questions.length - 1) {
    setTimeout(endQuiz, 1000);
  } else {
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Next Question →";
    nextBtn.style.backgroundColor = "#800080";
    nextBtn.style.color = "#fff";
    nextBtn.onclick = nextQuestion;
    choicesDiv.appendChild(nextBtn);
  }
}

function disableChoices() {
  choicesDiv.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
}
function enableChoices() {
  choicesDiv.querySelectorAll(".choice-btn").forEach(b => b.disabled = false);
}
function nextQuestion() {
  currentQuestion++;
  showQuestion();
}

function endQuiz() {
  quizScreen.classList.add("hidden");
  endScreen.classList.remove("hidden");
  endQuizTitle.textContent = quizTitle;

  const endTime = new Date();
  const totalSeconds = Math.floor((endTime - startTime) / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  finalResult.innerHTML = `
    ${nickname}'s score: ${score} / ${questions.length * 2}<br>
    Time taken: ${minutes} min ${seconds} sec<br>
    Finished on: ${endTime.toLocaleDateString()}<br>
    Finished at: ${endTime.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}
  `;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
</script>
</body>
</html>
