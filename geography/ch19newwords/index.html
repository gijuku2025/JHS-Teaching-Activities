<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geography Ch 19 New Words Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
    width: 380px;
  }
  h1 { font-size: 20px; margin-bottom: 12px; color: #333; }
  #gameTitle { font-size: 24px; color: #333; margin-bottom: 12px; }
  input[type="text"] { padding: 10px; width: 80%; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 20px; }
  button {
    padding: 12px; margin: 8px 0; width: 100%; border: none;
    border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s;
  }
  .primary { background-color: #4CAF50; color: white; }
  .primary:hover { background-color: #45a049; }
  .play-btn { background-color: #1E90FF; color: white; }
  .play-btn:hover { background-color: #1C86EE; }
  .choice-btn { margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
  .choice-btn:hover { opacity: 0.9; }
  .choice-btn.correct { animation: pulse 0.5s ease; }
  @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0px #4CAF50; } 50% { transform: scale(1.1); box-shadow: 0 0 12px #4CAF50; } 100% { transform: scale(1); box-shadow: 0 0 0px #4CAF50; } }
  .feedback { margin-top: 15px; font-weight: bold; font-size: 18px; }
  .hidden { display: none; }
  .progress-bar { width: 100%; height: 8px; background-color: #e0e0e0; border-radius: 4px; margin-bottom: 12px; }
  #progressFill { height: 100%; width: 0%; background-color: #FFA500; border-radius: 4px; transition: width 0.3s ease, background-color 0.3s ease; }
  #questionCounter { margin-bottom: 8px; font-weight: bold; color: #555; font-size: 16px; }
  @media (max-width: 768px) {
    .container { width: 90%; padding: 20px; }
    #gameTitle { font-size: 28px; }
    h1 { font-size: 22px; }
    button { font-size: 18px; padding: 16px; }
    .choice-btn { font-size: 20px; padding: 18px; }
    .feedback { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="container" id="startScreen">
  <h1>Enter nickname</h1>
  <input type="text" id="nickname" placeholder="Your name">
  <button class="primary" onclick="startQuiz()">Start</button>
</div>

<div class="container hidden" id="quizScreen">
  <h1 id="gameTitle">Geography Ch 19 New Words Quiz</h1>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div id="questionCounter">Question 1 of 10</div>
  <h1 id="questionTitle">Listen and choose:</h1>
  <button class="play-btn" onclick="playWord()">🔊 Play Word</button>
  <div id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="container hidden" id="endScreen">
  <h1>Quiz Finished!</h1>
  <p id="finalResult"></p>
  <button class="primary" onclick="location.reload()">Play Again</button>
</div>

<script>
// ====== Replace with your generated array including MP3 paths ======
const allWords = [
  { en: "Hindu", jp: "ヒンズー教徒", enAudio: "audio/hindu_en.mp3", jpAudio: "audio/ヒンズー教徒_jp.mp3" },
  { en: "Muslim", jp: "イスラム教徒", enAudio: "audio/muslim_en.mp3", jpAudio: "audio/イスラム教徒_jp.mp3" },
  { en: "Buddhist", jp: "仏教徒", enAudio: "audio/buddhist_en.mp3", jpAudio: "audio/仏教徒_jp.mp3" },
  { en: "English", jp: "英語", enAudio: "audio/english_en.mp3", jpAudio: "audio/英語_jp.mp3" },
  { en: "common language", jp: "共通言語", enAudio: "audio/common_language_en.mp3", jpAudio: "audio/共通言語_jp.mp3" },
  { en: "plains", jp: "平野", enAudio: "audio/plains_en.mp3", jpAudio: "audio/平野_jp.mp3" },
  { en: "Indus River", jp: "インダス川", enAudio: "audio/indus_river_en.mp3", jpAudio: "audio/インダス川_jp.mp3" },
  { en: "Ganges River", jp: "ガンジス川", enAudio: "audio/ganges_river_en.mp3", jpAudio: "audio/ガンジス川_jp.mp3" },
  { en: "wheat", jp: "小麦", enAudio: "audio/wheat_en.mp3", jpAudio: "audio/小麦_jp.mp3" },
  { en: "rice", jp: "米", enAudio: "audio/rice_en.mp3", jpAudio: "audio/米_jp.mp3" },
  { en: "rain", jp: "雨", enAudio: "audio/rain_en.mp3", jpAudio: "audio/雨_jp.mp3" },
  { en: "population", jp: "人口", enAudio: "audio/population_en.mp3", jpAudio: "audio/人口_jp.mp3" },
  { en: "modern medicine", jp: "近代医学", enAudio: "audio/modern_medicine_en.mp3", jpAudio: "audio/近代医学_jp.mp3" },
  { en: "harvest", jp: "収穫", enAudio: "audio/harvest_en.mp3", jpAudio: "audio/収穫_jp.mp3" },
  { en: "fertilizer", jp: "肥料", enAudio: "audio/fertilizer_en.mp3", jpAudio: "audio/肥料_jp.mp3" },
  { en: "pesticide", jp: "殺虫剤", enAudio: "audio/pesticide_en.mp3", jpAudio: "audio/殺虫剤_jp.mp3" },
  { en: "solar energy", jp: "太陽エネルギー", enAudio: "audio/solar_energy_en.mp3", jpAudio: "audio/太陽エネルギー_jp.mp3" },
  { en: "wind power", jp: "風力", enAudio: "audio/wind_power_en.mp3", jpAudio: "audio/風力_jp.mp3" },
  { en: "soccer balls", jp: "サッカーボール", enAudio: "audio/soccer_balls_en.mp3", jpAudio: "audio/サッカーボール_jp.mp3" },
  { en: "cattle hide", jp: "牛皮", enAudio: "audio/cattle_hide_en.mp3", jpAudio: "audio/牛皮_jp.mp3" },
  { en: "sacred", jp: "神聖", enAudio: "audio/sacred_en.mp3", jpAudio: "audio/神聖_jp.mp3" },
  { en: "factory", jp: "工場", enAudio: "audio/factory_en.mp3", jpAudio: "audio/工場_jp.mp3" },
  { en: "child labor", jp: "児童労働", enAudio: "audio/child_labor_en.mp3", jpAudio: "audio/児童労働_jp.mp3" },
  { en: "British colony", jp: "イギリスの植民地", enAudio: "audio/british_colony_en.mp3", jpAudio: "audio/イギリスの植民地_jp.mp3" },
  { en: "cotton", jp: "綿・綿花", enAudio: "audio/cotton_en.mp3", jpAudio: "audio/綿綿花_jp.mp3" },
  { en: "textile factory", jp: "繊維工場", enAudio: "audio/textile_factory_en.mp3", jpAudio: "audio/繊維工場_jp.mp3" },
  { en: "wages", jp: "賃金", enAudio: "audio/wages_en.mp3", jpAudio: "audio/賃金_jp.mp3" },
  { en: "car factory", jp: "自動車工場", enAudio: "audio/car_factory_en.mp3", jpAudio: "audio/自動車工場_jp.mp3" },
  { en: "computer", jp: "コンピュータ", enAudio: "audio/computer_en.mp3", jpAudio: "audio/コンピュータ_jp.mp3" },
  { en: "programmer", jp: "プログラマー", enAudio: "audio/programmer_en.mp3", jpAudio: "audio/プログラマー_jp.mp3" },
  { en: "ICT industry", jp: "ICT産業", enAudio: "audio/ict_industry_en.mp3", jpAudio: "audio/ict産業_jp.mp3" },
  { en: "call center", jp: "コールセンター", enAudio: "audio/call_center_en.mp3", jpAudio: "audio/コールセンター_jp.mp3" },
  { en: "slum", jp: "スラム", enAudio: "audio/slum_en.mp3", jpAudio: "audio/スラム_jp.mp3" },
];

// ====== Quiz logic ======
let words = [];
let nickname = "";
let currentQuestion = 0;
let score = 0;
let firstTry = true;
let startTime;

const startScreen = document.getElementById("startScreen");
const quizScreen = document.getElementById("quizScreen");
const endScreen = document.getElementById("endScreen");
const choicesDiv = document.getElementById("choices");
const feedbackDiv = document.getElementById("feedback");
const finalResult = document.getElementById("finalResult");
const questionCounterDiv = document.getElementById("questionCounter");
const progressFill = document.getElementById("progressFill");

function startQuiz() {
  nickname = document.getElementById("nickname").value.trim() || "Player";
  startTime = new Date();
  words = [...allWords];
  shuffle(words);
  words = words.slice(0, 10); // take 10 random words
  startScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  currentQuestion = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  feedbackDiv.textContent = "";
  feedbackDiv.classList.remove("correct");
  firstTry = true;
  choicesDiv.innerHTML = "";

  const q = words[currentQuestion];
  const isEnToJp = currentQuestion % 2 === 0;

  quizScreen.dataset.isEnToJp = isEnToJp;
  quizScreen.dataset.answer = isEnToJp ? q.jp : q.en;
  quizScreen.dataset.audio = isEnToJp ? q.enAudio : q.jpAudio;

  questionCounterDiv.textContent = `Question ${currentQuestion + 1} of ${words.length}`;
  const progress = (currentQuestion + 1) / words.length;
  progressFill.style.width = (progress * 100) + "%";
  progressFill.style.backgroundColor = progress < 0.5 ? "#FFA500" : progress < 1 ? "#FFD700" : "#4CAF50";

  let options = words.map(w => isEnToJp ? w.jp : w.en);
  shuffle(options);
  options = options.slice(0,3);
  if (!options.includes(quizScreen.dataset.answer)) {
    options[Math.floor(Math.random()*3)] = quizScreen.dataset.answer;
  }

  const colors = ["#FFA500", "#FF4C4C", "#4CAF50"]; 
  options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "choice-btn";
    btn.style.backgroundColor = colors[index % colors.length];
    btn.style.color = "#fff";
    btn.style.fontSize = "18px";
    btn.style.padding = "14px";
    btn.onclick = () => checkAnswer(opt, btn);
    choicesDiv.appendChild(btn);
  });
}

function playWord() {
  const audioFile = quizScreen.dataset.audio;
  if (!audioFile) return;
  const audio = new Audio(audioFile);
  audio.play();
}

function checkAnswer(choice, btn) {
  const correct = quizScreen.dataset.answer;
  disableChoices();

  if (choice === correct) {
    feedbackDiv.classList.add("correct");
    feedbackDiv.textContent = "Correct!";
    btn.classList.add("correct");
    score += firstTry ? 2 : 1;
  } else {
    if (firstTry) {
      feedbackDiv.style.color = "orange";
      feedbackDiv.textContent = "Try again!";
      firstTry = false;
      enableChoices();
      return;
    } else {
      feedbackDiv.style.color = "red";
      feedbackDiv.textContent = `Wrong! Correct answer: ${correct}`;
    }
  }

  if (currentQuestion === words.length - 1) {
    setTimeout(endQuiz, 1000);
  } else {
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Next Question →";
    nextBtn.style.backgroundColor = "#800080"; 
    nextBtn.style.color = "#fff";
    nextBtn.style.fontSize = "16px";
    nextBtn.style.padding = "12px";
    nextBtn.style.marginTop = "10px";
    nextBtn.style.borderRadius = "8px";
    nextBtn.onclick = nextQuestion;
    choicesDiv.appendChild(nextBtn);
  }
}

function disableChoices() {
  choicesDiv.querySelectorAll(".choice-btn").forEach(btn => btn.disabled = true);
}

function enableChoices() {
  choicesDiv.querySelectorAll(".choice-btn").forEach(btn => btn.disabled = false);
}

function nextQuestion() {
  currentQuestion++;
  showQuestion();
}

function endQuiz() {
  quizScreen.classList.add("hidden");
  endScreen.classList.remove("hidden");
  const endTime = new Date();
  const totalSeconds = Math.floor((endTime - startTime)/1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  const dateString = endTime.toLocaleDateString() + " " + endTime.toLocaleTimeString();

  const quizTitle = document.getElementById("gameTitle").textContent;

  finalResult.innerHTML = `<strong>${quizTitle}</strong><br><br>
                           ${nickname}'s score: ${score} / ${words.length * 2}<br>
                           Time played: ${minutes} min ${seconds} sec<br>
                           Date: ${dateString}`;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
</script>
</body>
</html>
