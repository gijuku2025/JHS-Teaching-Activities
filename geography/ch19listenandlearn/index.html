<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geography Ch 19 Listen and Learn</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
    width: 380px;
  }
  h1 { font-size: 20px; margin-bottom: 12px; color: #333; }
  #gameTitle { font-size: 20px; color: #333; margin-bottom: 12px; }
  input[type="text"] {
    padding: 10px; width: 80%;
    border: 1px solid #ccc; border-radius: 8px;
    margin-bottom: 20px;
  }
  button {
    padding: 12px; margin: 8px 0; width: 100%;
    border: none; border-radius: 8px;
    font-size: 16px; cursor: pointer;
  }
  .primary { background-color: #4CAF50; color: white; }
  .play-btn { background-color: #1E90FF; color: white; }
  .choice-btn {
    margin: 5px 0;
    border-radius: 8px;
    cursor: pointer;
    color: #fff;
    font-size: 18px;
    padding: 14px;
  }
  .feedback { margin-top: 15px; font-weight: bold; font-size: 18px; }
  .hidden { display: none; }
  .progress-bar {
    width: 100%; height: 8px;
    background-color: #e0e0e0;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  #progressFill {
    height: 100%; width: 0%;
    background-color: #FFA500;
    border-radius: 4px;
  }
  #endQuizTitle {
    font-size: 18px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div class="container" id="startScreen">
  <h1>Enter nickname</h1>
  <input type="text" id="nickname" placeholder="Your name">
  <button class="primary" onclick="startQuiz()">Start</button>
</div>

<div class="container hidden" id="quizScreen">
  <h1 id="gameTitle"></h1>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div id="questionCounter"></div>
  <h1>Listen and choose:</h1>
  <button class="play-btn" onclick="playSentence()">🔊 Play Sentence</button>
  <div id="choices"></div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="container hidden" id="endScreen">
  <h1>Quiz Finished!</h1>
  <h2 id="endQuizTitle"></h2>
  <p id="finalResult"></p>
  <button class="primary" onclick="location.reload()">Play Again</button>
</div>

<script>
const quizTitle = "Geography Ch 19 Listen and Learn";

const sentences = [
          { en: "Most people in India are Hindu.", jp: "インドでは多くの人々がヒンズー教徒である。", enAudio: "audio/01_most_people_in_india_are_hindu_en.mp3", jpAudio: "audio/01_most_people_in_india_are_hindu_jp.mp3" },
  { en: "Most people in Pakistan and Bangladesh are Muslim.", jp: "パキスタンとバングラデシュではほとんどの人がイスラム教徒である。", enAudio: "audio/02_most_people_in_pakistan_and_ba_en.mp3", jpAudio: "audio/02_most_people_in_pakistan_and_ba_jp.mp3" },
  { en: "Most people in Sri Lanka are Buddhist.", jp: "スリランカではほとんどの人が仏教徒である。", enAudio: "audio/03_most_people_in_sri_lanka_are_b_en.mp3", jpAudio: "audio/03_most_people_in_sri_lanka_are_b_jp.mp3" },
  { en: "India has many languages, but English is the common language.", jp: "インドには多くの言語があるが、英語が共通語である。", enAudio: "audio/04_india_has_many_languages_but_e_en.mp3", jpAudio: "audio/04_india_has_many_languages_but_e_jp.mp3" },
  { en: "Most of the wheat and rice in India grows on the plains in the north.", jp: "インドの小麦と米の多くは北部の平野で育つ。", enAudio: "audio/05_most_of_the_wheat_and_rice_in__en.mp3", jpAudio: "audio/05_most_of_the_wheat_and_rice_in__jp.mp3" },
  { en: "Wheat grows near the Indus River and the upper part of the Ganges River.", jp: "小麦はインダス川の近くとガンジス川の上流で育つ。", enAudio: "audio/06_wheat_grows_near_the_indus_riv_en.mp3", jpAudio: "audio/06_wheat_grows_near_the_indus_riv_jp.mp3" },
  { en: "Wheat grows well in these areas because there is not so much rain.", jp: "これらの地域では雨があまり多くないので小麦がよく育つ。", enAudio: "audio/07_wheat_grows_well_in_these_area_en.mp3", jpAudio: "audio/07_wheat_grows_well_in_these_area_jp.mp3" },
  { en: "Rice grows in the lower part of the Ganges River.", jp: "米はガンジス川の下流で育つ。", enAudio: "audio/08_rice_grows_in_the_lower_part_o_en.mp3", jpAudio: "audio/08_rice_grows_in_the_lower_part_o_jp.mp3" },
  { en: "Rice grows well in these areas because there is a lot of rain.", jp: "この地域では雨が多いので米がよく育つ。", enAudio: "audio/09_rice_grows_well_in_these_areas_en.mp3", jpAudio: "audio/09_rice_grows_well_in_these_areas_jp.mp3" },
  { en: "People in South Asia still have many children, but because of modern medicine, not so many people die.", jp: "南アジアでは今でも多くの子どもが生まれるが、近代医学のおかげで多くの人は死なない。", enAudio: "audio/10_people_in_south_asia_still_hav_en.mp3", jpAudio: "audio/10_people_in_south_asia_still_hav_jp.mp3" },
  { en: "Population in South Asia is growing very rapidly.", jp: "南アジアの人口はとても急速に増えている。", enAudio: "audio/11_population_in_south_asia_is_gr_en.mp3", jpAudio: "audio/11_population_in_south_asia_is_gr_jp.mp3" },
  { en: "India will soon have more than 1.4 billion people.", jp: "インドの人口はまもなく14億人以上になる。", enAudio: "audio/12_india_will_soon_have_more_than_en.mp3", jpAudio: "audio/12_india_will_soon_have_more_than_jp.mp3" },
  { en: "South Asia needs more food and energy for its many people.", jp: "南アジアは多くの人々のためにもっと多くの食料とエネルギーを必要としている。", enAudio: "audio/13_south_asia_needs_more_food_and_en.mp3", jpAudio: "audio/13_south_asia_needs_more_food_and_jp.mp3" },
  { en: "They are using new breeds of wheat and rice to increase harvests.", jp: "収穫を増やすために新しい品種の小麦と米を使っている。", enAudio: "audio/14_they_are_using_new_breeds_of_w_en.mp3", jpAudio: "audio/14_they_are_using_new_breeds_of_w_jp.mp3" },
  { en: "Pakistan makes more than half the soccer balls in the world.", jp: "パキスタンは世界のサッカーボールの半分以上を作っている。", enAudio: "audio/15_pakistan_makes_more_than_half__en.mp3", jpAudio: "audio/15_pakistan_makes_more_than_half__jp.mp3" },
  { en: "Hindus believe cattle are sacred, so they didn’t want to do this.", jp: "ヒンズー教徒は牛を神聖だと信じているのでそれをしたくなかった。", enAudio: "audio/16_hindus_believe_cattle_are_sacr_en.mp3", jpAudio: "audio/16_hindus_believe_cattle_are_sacr_jp.mp3" },
  { en: "Until 1990, there were not many companies from overseas in India.", jp: "1990年までインドには海外の会社はあまり多くなかった。", enAudio: "audio/17_until_1990_there_were_not_many_en.mp3", jpAudio: "audio/17_until_1990_there_were_not_many_jp.mp3" },
  { en: "Many companies from overseas came and built textile factories.", jp: "多くの海外企業が来て繊維工場を建てた。", enAudio: "audio/18_many_companies_from_overseas_c_en.mp3", jpAudio: "audio/18_many_companies_from_overseas_c_jp.mp3" },
  { en: "Indian schools have high levels of Math and English.", jp: "インドの学校では数学と英語のレベルが高い。", enAudio: "audio/19_indian_schools_have_high_level_en.mp3", jpAudio: "audio/19_indian_schools_have_high_level_jp.mp3" },
  { en: "Many American companies have 24-hour call services.", jp: "多くのアメリカの会社は24時間の電話サービスを持っている。", enAudio: "audio/20_many_american_companies_have_2_en.mp3", jpAudio: "audio/20_many_american_companies_have_2_jp.mp3" },
];

let questions = [];
let nickname = "";
let currentQuestion = 0;
let score = 0;
let firstTry = true;
let startTime;

const startScreen = document.getElementById("startScreen");
const quizScreen = document.getElementById("quizScreen");
const endScreen = document.getElementById("endScreen");
const gameTitleEl = document.getElementById("gameTitle");
const choicesDiv = document.getElementById("choices");
const feedbackDiv = document.getElementById("feedback");
const finalResult = document.getElementById("finalResult");
const questionCounterDiv = document.getElementById("questionCounter");
const progressFill = document.getElementById("progressFill");
const endQuizTitle = document.getElementById("endQuizTitle");

/* ---- logic unchanged below ---- */

function startQuiz() {
  nickname = document.getElementById("nickname").value.trim() || "Player";
  startTime = new Date();
  gameTitleEl.textContent = quizTitle;

  questions = [...sentences];
  shuffle(questions);
  questions = questions.slice(0, 10);

  const startEn = Math.random() < 0.5;
  questions = questions.map((q, i) => ({
    ...q,
    direction: (i % 2 === 0) ? (startEn ? "en" : "jp") : (startEn ? "jp" : "en")
  }));

  startScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  currentQuestion = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  feedbackDiv.textContent = "";
  feedbackDiv.style.color = "#333";
  firstTry = true;
  choicesDiv.innerHTML = "";

  const q = questions[currentQuestion];
  const isEnToJp = q.direction === "en";

  quizScreen.dataset.answer = isEnToJp ? q.jp : q.en;
  quizScreen.dataset.audio = isEnToJp ? q.enAudio : q.jpAudio;

  questionCounterDiv.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
  progressFill.style.width = ((currentQuestion + 1) / questions.length * 100) + "%";

  let pool = sentences.map(s => isEnToJp ? s.jp : s.en);
  shuffle(pool);

  let options = pool.slice(0, 3);
  if (!options.includes(quizScreen.dataset.answer)) {
    options[Math.floor(Math.random() * 3)] = quizScreen.dataset.answer;
  }

  const colors = ["#FFA500", "#FF4C4C", "#4CAF50"];
  options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "choice-btn";
    btn.style.backgroundColor = colors[i % colors.length];
    btn.onclick = () => checkAnswer(opt, btn);
    choicesDiv.appendChild(btn);
  });
}

function playSentence() {
  new Audio(quizScreen.dataset.audio).play();
}

function checkAnswer(choice, btn) {
  const correct = quizScreen.dataset.answer;
  disableChoices();

  if (choice === correct) {
    feedbackDiv.textContent = "Correct!";
    score += firstTry ? 2 : 1;
  } else if (firstTry) {
    feedbackDiv.style.color = "orange";
    feedbackDiv.textContent = "Try again!";
    firstTry = false;
    enableChoices();
    return;
  } else {
    feedbackDiv.style.color = "red";
    feedbackDiv.textContent = `Wrong! Correct answer: ${correct}`;
  }

  if (currentQuestion === questions.length - 1) {
    setTimeout(endQuiz, 1000);
  } else {
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Next Question →";
    nextBtn.style.backgroundColor = "#800080";
    nextBtn.style.color = "#fff";
    nextBtn.onclick = nextQuestion;
    choicesDiv.appendChild(nextBtn);
  }
}

function disableChoices() {
  choicesDiv.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
}
function enableChoices() {
  choicesDiv.querySelectorAll(".choice-btn").forEach(b => b.disabled = false);
}
function nextQuestion() {
  currentQuestion++;
  showQuestion();
}

function endQuiz() {
  quizScreen.classList.add("hidden");
  endScreen.classList.remove("hidden");
  endQuizTitle.textContent = quizTitle;

  const endTime = new Date();
  const totalSeconds = Math.floor((endTime - startTime) / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  finalResult.innerHTML = `
    ${nickname}'s score: ${score} / ${questions.length * 2}<br>
    Time taken: ${minutes} min ${seconds} sec<br>
    Finished on: ${endTime.toLocaleDateString()}<br>
    Finished at: ${endTime.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}
  `;
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
</script>
</body>
</html>
