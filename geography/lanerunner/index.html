<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruit Ninja Quiz Demo</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
overflow:hidden;
touch-action:none;
}

#ui{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:28px;
z-index:10;
}

#score{
font-size:22px;
margin-top:6px;
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="ui">
<div id="question">Which planet is called the Red Planet?</div>
<div id="score">Score: 0</div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let score = 0

const question = {
answers:["Mars","Earth","Venus","Jupiter"],
correct:"Mars"
}

let fruits = []

function spawnAnswers(){

fruits = []

question.answers.forEach(text=>{

fruits.push({
x: Math.random()*canvas.width,
y: canvas.height + 40,
vx: (Math.random()*4)-2,
vy: -(16 + Math.random()*6),
radius: 60,
text:text,
sliced:false
})

})

}

spawnAnswers()

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

fruits.forEach(f=>{

if(f.sliced) return

f.x += f.vx
f.y += f.vy
f.vy += .25

ctx.beginPath()
ctx.fillStyle = "#3498db"
ctx.arc(f.x,f.y,f.radius,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.font="20px Arial"
ctx.textAlign="center"
ctx.fillText(f.text,f.x,f.y+6)

})

requestAnimationFrame(update)

}

update()

let swipePath = []

canvas.addEventListener("touchstart",e=>{
swipePath = []
})

canvas.addEventListener("touchmove",e=>{

const t = e.touches[0]
swipePath.push({x:t.clientX,y:t.clientY})

sliceCheck()

})

function sliceCheck(){

if(swipePath.length < 2) return

const p = swipePath[swipePath.length-1]

fruits.forEach(f=>{

if(f.sliced) return

const dx = p.x - f.x
const dy = p.y - f.y
const dist = Math.sqrt(dx*dx+dy*dy)

if(dist < f.radius){

f.sliced = true

if(f.text === question.correct){
score++
}else{
score = Math.max(0,score-1)
}

document.getElementById("score").textContent="Score: "+score

setTimeout(spawnAnswers,800)

}

})

}

</script>

</body>
</html>
