<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Word Search</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 10px;
  touch-action: none;
  user-select: none;
  overflow: hidden;
}

h1 { text-align: center; margin-bottom: 5px; }
h2 { text-align: center; font-size: 16px; margin: 10px 0 5px; }

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.grid {
  display: grid;
  gap: 4px;
}

.cell {
  width: min(8vw, 40px);
  height: min(8vw, 40px);
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: min(4vw, 18px);
  border-radius: 4px;
}

.selected { background: lightblue; }
.found { background: yellow; }
.missed { background: red; color: white; }

.word-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px;
  max-width: 400px;
  width: 100%;
}

.word {
  padding: 6px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fafafa;
  font-weight: bold;
}

.found-word {
  text-decoration: line-through;
  color: gray;
}
</style>
</head>

<body>

<h1 id="title">Word Search</h1>

<!-- MODE -->
<div id="mode-select" class="container">
  <h2>Select Mode</h2>
  <div class="word-list">
    <div class="word" onclick="startPractice()">Practice</div>
    <div class="word" onclick="startChallenge()">Challenge</div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="container" style="display:none;">
  <h2>Select Chapter</h2>
  <div id="chapter-list" class="word-list"></div>
</div>

<!-- GAME -->
<div id="game" class="container" style="display:none;">
  <h2 id="timer" style="display:none;">Time: 0</h2>
  <div id="grid" class="grid"></div>

  <h2>Find:</h2>
  <div id="word-list" class="word-list"></div>

  <button id="next-btn" style="display:none;">Next</button>
</div>

<!-- RESULTS -->
<div id="results" class="container" style="display:none;">
  <h2>Results</h2>
  <h1 id="final-score">Score: 0</h1>
  <button onclick="showModeMenu()">Back</button>
</div>

<script>
let gridSize, grid, wordList, placedWords;
let selectedCells=[], isSelecting=false;
let mode="practice", level=1, score=0, gameFinished=false;
let fullWordList=[], roundComplete=false, roundScored=false;
let timeLeft=0, timerInterval=null;

function init(){
  showModeMenu();
}

function showModeMenu(){
  clearInterval(timerInterval);
  document.getElementById('mode-select').style.display='flex';
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('results').style.display='none';
}

function startPractice(){
  mode="practice";
  document.getElementById('mode-select').style.display='none';
  showMenu();
}

function startChallenge(){
  mode="challenge";
  level=1; score=0; gameFinished=false;
  document.getElementById('mode-select').style.display='none';
  showMenu();
}

async function showMenu(){
  const res=await fetch('./data/chapters.json');
  const data=await res.json();

  const list=document.getElementById('chapter-list');
  list.innerHTML='';

  data.chapters.forEach(ch=>{
    const div=document.createElement('div');
    div.className='word';
    div.textContent=ch.title;
    div.onclick=()=>loadChapter(ch.id);
    list.appendChild(div);
  });

  document.getElementById('menu').style.display='flex';
}

async function loadChapter(id){
  const res=await fetch(`./data/${id}.json`);
  const data=await res.json();

  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';

  document.getElementById('title').textContent=data.title;
  fullWordList=data.words.map(w=>w.toUpperCase());

  if(mode==="practice"){
    setupRound(5+Math.floor(Math.random()*3),10);
  } else {
    startLevel();
  }
}

function startLevel(){
  roundScored=false;

  if(level===1){ timeLeft=60; setupRound(5,8); }
  else if(level===2){ timeLeft=90; setupRound(7,10); }
  else { timeLeft=120; setupRound(8,12); }

  startTimer();
}

function setupRound(count,minGrid){
  roundComplete=false;
  clearInterval(timerInterval);

  wordList=[...fullWordList].sort(()=>Math.random()-0.5).slice(0,count);

  let longest=Math.max(...wordList.map(w=>w.length));
  gridSize=Math.max(minGrid,longest+2);

  grid=Array.from({length:gridSize},()=>Array(gridSize).fill(''));
  placedWords=[];

  placeWords();
  fillRandom();
  renderGrid();
  renderWords();
}

function placeWords(){
  const dirs=[[0,1],[1,0]];
  wordList=wordList.filter(word=>{
    for(let tries=0;tries<200;tries++){
      let dir=dirs[Math.floor(Math.random()*2)];
      let r=Math.floor(Math.random()*gridSize);
      let c=Math.floor(Math.random()*gridSize);

      let pos=[], fits=true;

      for(let i=0;i<word.length;i++){
        let nr=r+dir[0]*i, nc=c+dir[1]*i;
        if(nr>=gridSize||nc>=gridSize||grid[nr][nc]){fits=false;break;}
        pos.push([nr,nc]);
      }

      if(fits){
        pos.forEach(([r,c],i)=>grid[r][c]=word[i]);
        placedWords.push({word,positions:pos});
        return true;
      }
    }
    return false;
  });
}

function fillRandom(){
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  grid.forEach((row,r)=>row.forEach((_,c)=>{
    if(!grid[r][c]) grid[r][c]=letters[Math.floor(Math.random()*26)];
  }));
}

function renderGrid(){
  const el=document.getElementById('grid');
  el.innerHTML='';
  el.style.gridTemplateColumns=`repeat(${gridSize}, min(8vw,40px))`;

  grid.forEach((row,r)=>row.forEach((l,c)=>{
    let cell=document.createElement('div');
    cell.className='cell';
    cell.textContent=l;
    cell.dataset.row=r; cell.dataset.col=c;

    cell.addEventListener('mousedown',startSel);
    cell.addEventListener('mouseenter',moveSel);
    cell.addEventListener('mouseup',endSel);

    cell.addEventListener('touchstart',e=>{e.preventDefault();startSel(e);},{passive:false});
    cell.addEventListener('touchmove',e=>{e.preventDefault();moveSel(e);},{passive:false});
    cell.addEventListener('touchend',e=>{e.preventDefault();endSel(e);},{passive:false});

    el.appendChild(cell);
  }));
}

function renderWords(){
  const el=document.getElementById('word-list');
  el.innerHTML='';
  wordList.forEach(w=>{
    let d=document.createElement('div');
    d.className='word';
    d.textContent=w;
    d.dataset.word=w;
    el.appendChild(d);
  });
}

function startSel(e){
  isSelecting=true;
  selectedCells=[e.target];
  e.target.classList.add('selected');
}

function moveSel(e){
  if(!isSelecting) return;
  let el=e.touches?document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY):e.target;
  if(!el||!el.classList.contains('cell')||selectedCells.includes(el)) return;
  selectedCells.push(el);
  el.classList.add('selected');
}

function endSel(){
  if(!isSelecting) return;
  isSelecting=false;

  let word=selectedCells.map(c=>c.textContent).join('');
  if(wordList.includes(word)){
    selectedCells.forEach(c=>c.classList.add('found'));
    document.querySelector(`[data-word="${word}"]`).classList.add('found-word');
    checkWin();
  }

  selectedCells.forEach(c=>c.classList.remove('selected'));
  selectedCells=[];
}

function checkWin(){
  if(document.querySelectorAll('.found-word').length===wordList.length){
    roundComplete=true;
    clearInterval(timerInterval);

    if(!roundScored){
      score+=wordList.length*10+timeLeft*2;
      roundScored=true;
    }

    document.getElementById('next-btn').style.display='block';
  }
}

function startTimer(){
  if(mode!=="challenge") return;
  const el=document.getElementById('timer');
  el.style.display='block';

  timerInterval=setInterval(()=>{
    timeLeft--;
    el.textContent="Time: "+timeLeft;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      revealMissed();
      document.getElementById('next-btn').style.display='block';
    }
  },1000);
}

function revealMissed(){
  placedWords.forEach(p=>{
    if(!document.querySelector(`[data-word="${p.word}"]`).classList.contains('found-word')){
      p.positions.forEach(([r,c])=>{
        document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`).classList.add('missed');
      });
    }
  });
}

document.getElementById('next-btn').onclick=()=>{
  document.getElementById('next-btn').style.display='none';

  if(mode==="challenge"){
    if(roundComplete){
      if(level<3){ level++; startLevel(); }
      else{ gameFinished=true; showResults(); }
    } else startLevel();
  } else showMenu();
};

function showResults(){
  document.getElementById('game').style.display='none';
  document.getElementById('results').style.display='flex';
  document.getElementById('final-score').textContent="Score: "+score;
}

init();
</script>

</body>
</html>
