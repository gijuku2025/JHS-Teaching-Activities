<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Search</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10px;
      touch-action: manipulation;
      user-select: none;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    h2 {
      text-align: center;
      font-size: 16px;
      margin: 10px 0 5px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, min(8vw, 40px));
      justify-content: center;
      gap: 4px;
      margin: 0 auto;
    }

    .cell {
      width: min(8vw, 40px);
      height: min(8vw, 40px);
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(4vw, 18px);
      border-radius: 4px;
    }

    .selected {
      background: lightblue;
    }

    .found {
      background: yellow;
    }

    .word-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      width: 100%;
      max-width: 400px;
    }

    .word {
      padding: 6px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fafafa;
      font-weight: bold;
    }

    .found-word {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>

<body>
  <h1 id="title">Word Search</h1>

  <div class="container">
    <div id="grid" class="grid"></div>

    <h2>Find these words:</h2>
    <div id="word-list" class="word-list"></div>
  </div>

  <script>
    const gridSize = 10;
    let grid = [];
    let wordList = [];
    let selectedCells = [];

    async function init() {
      const res = await fetch('./data/words.json');
      const data = await res.json();

      document.getElementById('title').textContent = data.title;
      wordList = data.words.map(w => w.toUpperCase());

      createEmptyGrid();
      placeWords();
      fillRandom();
      renderGrid();
      renderWordList();
    }

    function createEmptyGrid() {
      grid = Array.from({ length: gridSize }, () =>
        Array.from({ length: gridSize }, () => '')
      );
    }

    function placeWords() {
      wordList.forEach(word => {
        let placed = false;
        let attempts = 0;

        while (!placed && attempts < 100) {
          attempts++;

          const row = Math.floor(Math.random() * gridSize);
          const col = Math.floor(Math.random() * (gridSize - word.length));

          let fits = true;
          for (let i = 0; i < word.length; i++) {
            if (grid[row][col + i] && grid[row][col + i] !== word[i]) {
              fits = false;
              break;
            }
          }

          if (fits) {
            for (let i = 0; i < word.length; i++) {
              grid[row][col + i] = word[i];
            }
            placed = true;
          }
        }
      });
    }

    function fillRandom() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          if (!grid[r][c]) {
            grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
          }
        }
      }
    }

    function renderGrid() {
      const gridEl = document.getElementById('grid');
      gridEl.innerHTML = '';

      grid.forEach((row, r) => {
        row.forEach((letter, c) => {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.textContent = letter;
          cell.dataset.row = r;
          cell.dataset.col = c;

          cell.addEventListener('touchstart', () => startSelection(cell));
          cell.addEventListener('touchmove', (e) => moveSelection(e));
          cell.addEventListener('touchend', endSelection);

          gridEl.appendChild(cell);
        });
      });
    }

    function renderWordList() {
      const listEl = document.getElementById('word-list');
      listEl.innerHTML = '';

      wordList.forEach(word => {
        const div = document.createElement('div');
        div.className = 'word';
        div.textContent = word;
        div.dataset.word = word;
        listEl.appendChild(div);
      });
    }

    function startSelection(cell) {
      clearSelection();
      selectedCells = [cell];
      cell.classList.add('selected');
    }

    function moveSelection(e) {
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);

      if (el && el.classList.contains('cell') && !selectedCells.includes(el)) {
        selectedCells.push(el);
        el.classList.add('selected');
      }
    }

    function endSelection() {
      const word = selectedCells.map(c => c.textContent).join('');
      const reversed = word.split('').reverse().join('');

      if (wordList.includes(word) || wordList.includes(reversed)) {
        selectedCells.forEach(c => {
          c.classList.remove('selected');
          c.classList.add('found');
        });

        const matched = wordList.includes(word) ? word : reversed;
        document.querySelector(`[data-word="${matched}"]`).classList.add('found-word');
      } else {
        clearSelection();
      }

      selectedCells = [];
    }

    function clearSelection() {
      document.querySelectorAll('.selected').forEach(c => c.classList.remove('selected'));
    }

    init();
  </script>
</body>
</html>
